<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Jasper Salon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="overlay">
        <div class="login-box">
            <h2>CREATE ACCOUNT</h2>
            
            <form id="signupForm">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                
                <div class="password-box">
                    <input type="password" id="userPass" placeholder="Create Password" required>
                    <span onclick="togglePassword('userPass')">👁️</span>
                </div>

                <div class="password-box">
                    <input type="password" id="confirmPass" placeholder="Confirm Password" required>
                    <span onclick="togglePassword('confirmPass')">👁️</span>
                </div>

                <button type="submit">SIGN UP</button>
            </form>

            <div class="divider"></div>

            <p style="font-size: 14px; color: #bbb;">Already have an account? 
                <a href="login.html" style="color: #ffcc00; text-decoration: none; font-weight: bold;">Login here</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
