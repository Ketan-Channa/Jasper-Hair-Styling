<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Female Services - Jasper Salon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">JASPER HAIR SALON AND STYLING SERVICES</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="booking.html">My Bookings</a>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="services-container">
        <h2 class="section-title">LADIES' PREMIUM CARE</h2>
        <div class="services-grid">
            <div class="service-card"><img src="images/services/layer-f.jpg"><div class="service-info"><h3>Layered Cut</h3><span class="price">₹999</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/color-f.jpg"><div class="service-info"><h3>Global Color</h3><span class="price">₹2499</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/keratin.jpg"><div class="service-info"><h3>Keratin Treatment</h3><span class="price">₹4999</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/bridal.jpg"><div class="service-info"><h3>Bridal Makeup</h3><span class="price">₹7999</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/spa.jpg"><div class="service-info"><h3>Hair Spa</h3><span class="price">₹1299</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/threading.jpg"><div class="service-info"><h3>Eyebrow Shaping</h3><span class="price">₹149</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/balayage.jpg"><div class="service-info"><h3>Balayage</h3><span class="price">₹3499</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/mani-pedi.jpg"><div class="service-info"><h3>Luxury Mani-Pedi</h3><span class="price">₹1199</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
