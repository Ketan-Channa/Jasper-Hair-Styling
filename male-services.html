<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Male Services - Jasper Salon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">JASPER HAIR SALON AND STYLING SERVICES</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="booking.html">My Bookings</a>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="services-container">
        <h2 class="section-title">GENTLEMEN'S GROOMING</h2>
        <div class="services-grid">
            <div class="service-card"><img src="images/services/fade.jpg"><div class="service-info"><h3>Classic Fade</h3><span class="price">₹499</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/beard.jpg"><div class="service-info"><h3>Beard Sculpting</h3><span class="price">₹299</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/buzz.jpg"><div class="service-info"><h3>Executive Buzz</h3><span class="price">₹399</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/men-color.jpg"><div class="service-info"><h3>Grey Blending</h3><span class="price">₹899</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/massage.jpg"><div class="service-info"><h3>Head Massage</h3><span class="price">₹599</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/cleanup.jpg"><div class="service-info"><h3>Face Cleanup</h3><span class="price">₹799</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/straight.jpg"><div class="service-info"><h3>Straightening</h3><span class="price">₹1499</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
            <div class="service-card"><img src="images/services/shave.jpg"><div class="service-info"><h3>Royal Shave</h3><span class="price">₹349</span><button class="book-now" onclick="window.location.href='booking.html'">Book Now</button></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
