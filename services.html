<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Services - Jasper Salon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">JASPER SALON</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="services.html" class="active">Services</a>
            <a href="booking.html">My Bookings</a>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="services-container">
        <h2 class="section-title">CHOOSE YOUR STYLE</h2>
        
        <div class="services-grid">
            <div class="service-card">
                <img src="images/services/fade.jpg" alt="Classic Fade">
                <div class="service-info">
                    <h3>Classic Fade</h3>
                    <p>Clean, sharp, and modern. A timeless choice.</p>
                    <span class="price">$25</span>
                    <button class="book-now" onclick="window.location.href='booking.html'">Book Now</button>
                </div>
            </div>

            <div class="service-card">
                <img src="images/services/beard.jpg" alt="Beard Grooming">
                <div class="service-info">
                    <h3>Beard Styling</h3>
                    <p>Shaping and trimming for the perfect look.</p>
                    <span class="price">$15</span>
                    <button class="book-now" onclick="window.location.href='booking.html'">Book Now</button>
                </div>
            </div>

            <div class="service-card">
                <img src="images/services/styling.jpg" alt="Hair Styling">
                <div class="service-info">
                    <h3>Premium Styling</h3>
                    <p>Wash, blow-dry, and professional product styling.</p>
                    <span class="price">$35</span>
                    <button class="book-now" onclick="window.location.href='booking.html'">Book Now</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
