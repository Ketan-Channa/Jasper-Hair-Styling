<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Jasper Salon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="overlay">
        <div class="login-box">
            <h2>LOGIN</h2>
            
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Enter Email" required>
                
                <div class="password-box">
                    <input type="password" id="loginPass" placeholder="Enter Password" required>
                    <span onclick="togglePassword('loginPass')">👁️</span>
                </div>

                <div class="auth-links">
                    <a href="forgot.html">Forgot Password?</a>
                </div>

                <button type="submit" style="margin-top: 20px;">LOGIN</button>
            </form>

            <div class="divider"></div>

            <div class="signup-section">
                <p>New to Jasper Salon?</p>
                <button onclick="window.location.href='signup.html'" class="btn-secondary">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
